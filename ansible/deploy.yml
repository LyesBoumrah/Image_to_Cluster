- name: Deploy custom Nginx on K3d
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create Nginx deployment
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: nginx-custom
            namespace: default
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: nginx-custom
            template:
              metadata:
                labels:
                  app: nginx-custom
              spec:
                containers:
                  - name: nginx-custom
                    image: nginx-custom:latest
                    imagePullPolicy: Never
                    ports:
                      - containerPort: 80

    - name: Create Nginx service
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: nginx-custom-service
            namespace: default
          spec:
            type: NodePort
            selector:
              app: nginx-custom
            ports:
              - port: 80
                targetPort: 80

